<!DOCTYPE html>
<html lang="es">
<head>
  
  <link rel="stylesheet" href="style.css">

</head>
<body>

  <div class="container">

    <!--MENU IZQUIERDA -->

    <aside class="sidebar">
      <h2 class="logo">TattooPro</h2>
      <p class="sub">EL ARTE EN LA PIEL.</p>

      <nav class="side-menu">
        <a href="dashboard.html">Inicio</a>
        <a href="agenda.html" class="active">Agenda</a>
        <a href="citas.html">Citas</a>
        <a href="perfil.html">Perfil</a>
      </nav>
    </aside>

    <!-- CONTENIDO -->
    <div class="content">

      <!-- MENU ARRIBA -->
      <header class="topbar">
        <span class="logo">TattooPro Connect</span>

        <nav class="menu">
          <a href="dashboard.html">Inicio</a>
          <a href="agenda.html" class="active">Agenda</a>
          <a href="citas.html">Citas</a>
          <a href="#">Perfil</a>
        </nav>
      </header>

      <!--AGENDAR:-->
      <main class="main">

        <h1 class="titulo">Nueva Cita</h1>
        <p class="subtitulo">Gestiona la agenda.</p>

        <section class="card">

          <!--FormularioCitas-->
          <form id="formCita" class="formulario">
            
            <!--Nombre-->
            <div class="campo">
              <label>Nombre del cliente</label>
              <input id="cliente" type="text" placeholder="Ingresa el nombre completo" required>
            </div>

            <!--Fecha-->
            <div class="grid">
              <div class="campo">
                <label>Fecha</label>
                <input id="fecha" type="date" required>
              </div>
              
              <!--Hora-->
              <div class="campo">
                <label>Hora</label>
                <input id="hora" type="time" required>
              </div>
            </div>

            <div class="info-box">
              <p>Se enviará una notificación automática 24 horas antes.</p>
            </div>

            <div class="botones">
              <button type="button" class="btn-sec" onclick="window.location.href='dashboard.html'">Volver</button>
              <button type="submit" class="btn-pri">Guardar cita</button>
            </div>
          </form>
        </section>

      </main>
      
      <!--FUNCION:-->
      <script>

        const form = document.getElementById("formCita");
        form.addEventListener("submit", function (e) {
          e.preventDefault();

          const cliente = document.getElementById("cliente").value;
          const fecha = document.getElementById("fecha").value;
          const hora = document.getElementById("hora").value;

          const nuevaCita = { cliente, fecha, hora };

          let citas = JSON.parse(localStorage.getItem("citas")) || [];

          citas.push(nuevaCita);

          localStorage.setItem("citas", JSON.stringify(citas));

          alert("✅ Cita guardada");

          form.reset();
        });
      </script>
      
</body>
</html>
